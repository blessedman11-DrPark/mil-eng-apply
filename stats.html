<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>통계 - 군사영어 문장 선택 현황</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <header>
    <a href="mil_eng_apply.html" class="back-link">← 메인으로</a>
    <h1>선택 현황 통계</h1>
  </header>

  <main class="container">
    <section id="summary-section">
      <h2>요약</h2>
      <div class="stat-cards">
        <div class="stat-card">
          <span class="stat-label">전체 학생</span>
          <span class="stat-value" id="total-students">-</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">선택 완료</span>
          <span class="stat-value" id="selected-students">-</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">전체 문장 수</span>
          <span class="stat-value" id="total-sentences">-</span>
        </div>
      </div>
    </section>

    <section id="sentence-stats-section">
      <h2>문장별 선택 현황</h2>
      <table id="stats-table">
        <thead>
          <tr>
            <th>번호</th>
            <th>문장</th>
            <th>카테고리</th>
            <th>선택 학생 수</th>
            <th>선택 학생 목록</th>
          </tr>
        </thead>
        <tbody id="stats-table-body"></tbody>
      </table>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/stats.js"></script>
</body>
</html>
