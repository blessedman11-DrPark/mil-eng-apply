<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>군사영어-통계</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
</head>
<body>
<header>
  <a href="mil_eng_apply.html" class="back-link">← 메인</a>
  <h1>배정 현황 통계</h1>
  <span class="header-spacer"></span>
  <button class="btn btn-secondary btn-sm" id="refresh-btn" style="font-size:.82rem">🔄 새로고침</button>
</header>

<main class="container">
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="students">학생별 현황</button>
    <button class="tab-btn" data-tab="rounds">회차별 기록</button>
  </div>

  <!-- ════════ 탭1: 학생별 현황 ════════ -->
  <div id="tab-students" class="tab-content active">

    <!-- 차트 -->
    <div class="section-card">
      <h2>학생별 누계 당첨 횟수</h2>
      <div class="chart-outer">
        <div class="chart-inner" id="chart-wrap">
          <canvas id="bar-chart"></canvas>
        </div>
      </div>
      <p id="chart-empty" class="text-muted text-center mt-2 hidden">데이터가 없습니다</p>
    </div>

    <!-- 테이블 -->
    <div class="section-card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem">
        <h2 style="margin:0">당첨 순위</h2>
        <div class="sort-btn-group">
          <button class="btn btn-sm sort-btn active" id="sort-by-wins">당첨횟수 순</button>
          <button class="btn btn-sm sort-btn" id="sort-by-id">학번 순</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>순위</th><th>학번</th><th>이름</th><th>당첨 횟수</th><th>마지막 당첨일</th></tr></thead>
          <tbody id="tbody-rank"></tbody>
        </table>
      </div>
    </div>

    <!-- 미당첨 -->
    <div class="section-card" id="no-win-section" style="display:none">
      <h2>미당첨 학생</h2>
      <div id="no-win-list" class="text-muted" style="font-size:.9rem"></div>
    </div>

    <!-- 미신청 -->
    <div class="section-card" id="no-apply-section" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem">
        <h2 style="margin:0">미신청 학생 <span id="no-apply-count" style="font-size:.85rem;font-weight:400;color:#999"></span></h2>
        <button class="btn btn-sm btn-secondary" id="no-apply-name-toggle">이름 표시</button>
      </div>
      <div id="no-apply-list" style="font-size:.9rem;color:#666;line-height:1.9"></div>
    </div>
  </div>

  <!-- ════════ 탭2: 회차별 기록 ════════ -->
  <div id="tab-rounds" class="tab-content">

    <div class="section-card">
      <h2>회차 선택</h2>
      <div class="form-group" style="max-width:200px;margin-bottom:0">
        <select id="round-select"><option value="">-- 회차를 선택하세요 --</option></select>
      </div>
    </div>

    <div class="section-card" id="round-detail-section" style="display:none">
      <h2 id="round-detail-title"></h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>학번</th><th>이름</th><th>배정 문장</th><th>당첨 일시</th></tr></thead>
          <tbody id="tbody-round-detail"></tbody>
        </table>
      </div>
    </div>

    <div class="section-card">
      <h2>전체 회차 요약</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>회차</th><th>날짜</th><th>참여 인원</th></tr></thead>
          <tbody id="tbody-rounds-summary"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/stats.js"></script>
</body>
</html>
