<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>26-1 군사영어 문장 선택하기</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<header>
  <h1>🎖️ 26-1 군사영어 문장 선택하기</h1>
  <span class="header-spacer"></span>
  <span style="color:#aab4c8;font-size:.82rem">건양대학교 군사학과</span>
</header>

<main class="container">
  <div class="nav-cards">
    <button class="card" onclick="location.href='student.html'">
      <div class="card-icon">📝</div>
      <h2>학생</h2>
      <p>문장 신청하기</p>
    </button>
    <button class="card" id="btn-professor">
      <div class="card-icon">👨‍🏫</div>
      <h2>교수</h2>
      <p>대시보드 접속</p>
    </button>
    <button class="card" id="btn-stats">
      <div class="card-icon">📊</div>
      <h2>통계 보기</h2>
      <p>배정 현황 확인</p>
    </button>
  </div>
</main>

<!-- 통계 암호 모달 -->
<div class="modal-overlay" id="stats-pw-modal">
  <div class="modal">
    <h3>🔒 통계 접근</h3>
    <div class="form-group">
      <label for="stats-pw-input">암호 <span style="font-size:.85rem;color:#8896a5">(g*)</span></label>
      <input type="password" id="stats-pw-input" placeholder="9글자" autocomplete="off"/>
    </div>
    <div id="stats-pw-error" class="msg msg-error hidden"></div>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="stats-pw-cancel">취소</button>
      <button class="btn btn-primary" id="stats-pw-confirm">확인</button>
    </div>
  </div>
</div>

<!-- 교수 비밀번호 모달 -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal">
    <h3>🔒 교수 인증</h3>
    <div class="form-group">
      <label for="pw-input">비밀번호</label>
      <input type="password" id="pw-input" placeholder="비밀번호를 입력하세요" autocomplete="off"/>
    </div>
    <div id="pw-error" class="msg msg-error hidden"></div>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="pw-cancel">취소</button>
      <button class="btn btn-primary" id="pw-confirm">확인</button>
    </div>
  </div>
</div>

<footer style="text-align:center;padding:2rem 0 1.5rem;color:#5a6478;font-size:.75rem;line-height:1.8;">
  <div>© 2026 건양대학교 군사학과 박헌규 교수</div>
  <div style="color:#3d4456;font-size:.68rem;">최종 수정: 2026-05-07</div>
</footer>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script>
  initSupabase();

  // ── 통계 암호 모달 ──
  const statsModal   = document.getElementById('stats-pw-modal');
  const statsPwInput = document.getElementById('stats-pw-input');
  const statsPwError = document.getElementById('stats-pw-error');

  document.getElementById('btn-stats').addEventListener('click', () => {
    statsPwInput.value = '';
    statsPwError.classList.add('hidden');
    statsModal.classList.add('open');
    setTimeout(() => statsPwInput.focus(), 80);
  });

  document.getElementById('stats-pw-cancel').addEventListener('click', () => statsModal.classList.remove('open'));
  statsModal.addEventListener('click', e => { if (e.target === statsModal) statsModal.classList.remove('open'); });

  document.getElementById('stats-pw-confirm').addEventListener('click', checkStatsPassword);
  statsPwInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkStatsPassword(); });

  function checkStatsPassword() {
    if (statsPwInput.value.trim() === 'gladiolus') {
      location.href = 'stats.html';
    } else {
      statsPwError.textContent = '암호가 올바르지 않습니다.';
      statsPwError.classList.remove('hidden');
      statsPwInput.focus();
      statsPwInput.select();
    }
  }

  // ── 교수 비밀번호 모달 ──
  const modal   = document.getElementById('pw-modal');
  const pwInput = document.getElementById('pw-input');
  const pwError = document.getElementById('pw-error');

  document.getElementById('btn-professor').addEventListener('click', () => {
    pwInput.value = '';
    pwError.classList.add('hidden');
    modal.classList.add('open');
    setTimeout(() => pwInput.focus(), 80);
  });

  document.getElementById('pw-cancel').addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

  document.getElementById('pw-confirm').addEventListener('click', checkPassword);
  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

  async function checkPassword() {
    const pw = pwInput.value.trim();
    if (!pw) return;

    document.getElementById('pw-confirm').disabled = true;
    const { data, error } = await db.from(TABLES.SETTINGS).select('password1,password2').maybeSingle();
    document.getElementById('pw-confirm').disabled = false;

    if (error) {
      pwError.textContent = `DB 오류: ${error.message} (code: ${error.code})`;
      pwError.classList.remove('hidden');
      return;
    }
    if (!data) {
      pwError.textContent = 'settings 테이블에 데이터가 없습니다. Supabase에서 행을 추가해주세요.';
      pwError.classList.remove('hidden');
      return;
    }

    if (pw === data.password1 || pw === data.password2) {
      // 만료 시각(30분 후)을 함께 저장
      sessionStorage.setItem('prof_auth', String(Date.now() + 30 * 60 * 1000));
      location.href = 'professor.html';
    } else {
      pwError.textContent = '비밀번호가 올바르지 않습니다.';
      pwError.classList.remove('hidden');
      pwInput.focus();
      pwInput.select();
    }
  }
</script>
</body>
</html>
